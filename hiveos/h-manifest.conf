# Custom XMRig miner for HiveOS (0% dev fee)
CUSTOM_NAME=xmrig-nodevfee

# Full path to miner
CUSTOM_LOG_BASENAME=/var/log/miner/xmrig-nodevfee/xmrig-nodevfee
CUSTOM_CONFIG_FILENAME=/hive/miners/custom/$CUSTOM_NAME/config.json

# API port for stats
CUSTOM_API_PORT=60080

# Version
MINER_VER=6.25.0-nodevfee-v12.1
MINER_NAME=$CUSTOM_NAME

# Latest version marker
MINER_LATEST_VER=$MINER_VER
